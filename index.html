<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运营功能说明 · TMS 操盘系统</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2563eb;
      --theme-color-light: #eff6ff;
      --border-color: #e5e7eb;
      --text-color: #1f2937;
      --text-light: #6b7280;
      --bg-color: #fafbfc;
      --sidebar-bg: #ffffff;
      --header-h: 56px;
      --tabs-h: 44px;
      --top-h: 100px;
      --sidebar-w: 280px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    /* ========== Header ========== */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .app-logo {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; text-decoration: none; color: var(--text-color);
    }
    .app-logo-mark {
      width: 32px; height: 32px; background: var(--theme-color);
      color: #fff; border-radius: 6px; display: flex;
      align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .app-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
    .app-logo-text .t1 { font-size: 14px; font-weight: 600; }
    .app-logo-text .t2 { font-size: 11px; color: var(--text-light); }

    /* 搜索框 */
    .app-search-wrap {
      flex: 1; display: flex; justify-content: center; padding: 0 24px;
    }
    .app-search { position: relative; width: 100%; max-width: 520px; }
    .app-search input {
      width: 100%; padding: 9px 36px 9px 38px;
      font-size: 13.5px; border: 1px solid var(--border-color);
      border-radius: 6px; background: var(--bg-color);
      outline: none; transition: all .15s; box-sizing: border-box;
    }
    .app-search input:focus {
      border-color: var(--theme-color); background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .app-search .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-light);
      font-size: 16px; pointer-events: none;
    }
    .app-search .clear-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); background: none; border: none;
      color: var(--text-light); cursor: pointer; font-size: 16px;
      display: none; padding: 2px 6px;
    }
    .app-search.has-text .clear-btn { display: block; }
    .app-search .search-results {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      max-height: 480px; overflow-y: auto;
      background: #fff; border: 1px solid var(--border-color);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.08);
      z-index: 1100; display: none;
    }
    .app-search.active .search-results { display: block; }
    .result-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f3f4f6;
      transition: background .12s;
    }
    .result-item:hover, .result-item.active { background: var(--theme-color-light); }
    .result-item-title { font-size: 13.5px; font-weight: 600; color: var(--text-color); }
    .result-item-path { font-size: 11.5px; color: var(--text-light); margin-top: 2px; }
    .result-item-snippet { font-size: 12px; color: var(--text-light); margin-top: 4px; line-height: 1.5; }
    .result-item-snippet mark { background: #fef3c7; color: #92400e; padding: 0 2px; border-radius: 2px; }
    .result-empty { padding: 20px; text-align: center; color: var(--text-light); font-size: 13px; }

    /* 操盘原型按钮 */
    .app-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .app-action-btn {
      padding: 7px 14px; font-size: 12.5px; font-weight: 500;
      border: 1px solid var(--border-color); border-radius: 6px;
      background: #fff; color: var(--text-color); cursor: pointer;
      text-decoration: none; transition: all .15s;
    }
    .app-action-btn:hover { border-color: var(--theme-color); color: var(--theme-color); }

    /* ========== Tabs ========== */
    .app-tabs {
      position: fixed;
      top: var(--header-h); left: 0; right: 0;
      height: var(--tabs-h);
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 999;
      overflow-x: auto;
    }
    .app-tab {
      padding: 0 18px; height: 100%;
      display: flex; align-items: center; gap: 6px;
      font-size: 13.5px; color: var(--text-light);
      cursor: pointer; text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: all .15s; white-space: nowrap;
    }
    .app-tab:hover { color: var(--theme-color); }
    .app-tab.active {
      color: var(--theme-color);
      border-bottom-color: var(--theme-color);
      font-weight: 600;
    }
    .app-tab .icon { font-size: 14px; }

    /* ========== docsify 主区域调整 ========== */
    body.ready { padding-top: var(--top-h); }

    /* docsify sidebar 调整 */
    .sidebar {
      top: var(--top-h) !important;
      padding-top: 0 !important;
      width: var(--sidebar-w) !important;
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--border-color) !important;
    }
    .sidebar > h1 { display: none; }
    .sidebar-nav { margin: 16px 0; padding: 0 16px; }
    .sidebar-nav > ul > li > p {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      color: var(--text-light); letter-spacing: .5px;
      margin: 16px 0 8px; padding: 0 8px;
    }
    .sidebar-nav ul li a {
      font-size: 13.5px; padding: 6px 10px;
      border-radius: 4px; color: var(--text-color);
      display: block; line-height: 1.4;
    }
    .sidebar-nav ul li a:hover {
      background: var(--theme-color-light); color: var(--theme-color);
    }
    .sidebar-nav ul li.active > a {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 2px solid var(--theme-color);
    }

    /* 内容区 */
    .content {
      top: var(--top-h) !important;
      left: var(--sidebar-w) !important;
      right: 0 !important;
      padding-top: 0 !important;
    }
    .markdown-section {
      max-width: 960px !important;
      padding: 32px 48px !important;
    }
    .markdown-section h1 {
      font-size: 28px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }
    .markdown-section h2 {
      font-size: 21px; margin-top: 32px; margin-bottom: 16px;
      padding-top: 12px; border-top: 1px dashed #e5e7eb;
    }
    .markdown-section h3 { font-size: 17px; margin-top: 24px; }
    .markdown-section table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      font-size: 13.5px;
    }
    .markdown-section table th {
      background: #f9fafb; font-weight: 600; text-align: left;
      padding: 10px 12px; border: 1px solid var(--border-color);
    }
    .markdown-section table td {
      padding: 8px 12px; border: 1px solid var(--border-color);
      vertical-align: top;
    }
    .markdown-section blockquote {
      background: #fef3c7; border-left: 4px solid #f59e0b;
      padding: 12px 16px; margin: 16px 0; color: #78350f;
    }
    .markdown-section code {
      background: #f3f4f6; padding: 2px 6px; border-radius: 3px;
      font-size: 13px;
    }
    .markdown-section pre {
      background: #1e293b; padding: 16px; border-radius: 6px;
      overflow-x: auto;
    }
    .markdown-section pre code {
      background: transparent; color: #e2e8f0;
    }

    /* 隐藏 docsify 默认 sidebar-toggle */
    .sidebar-toggle { display: none !important; }

    @media (max-width: 768px) {
      :root { --sidebar-w: 0; }
      .content { left: 0 !important; }
      .markdown-section { padding: 16px 20px !important; }
      .app-search { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- ========== Header ========== -->
<header class="app-header">
  <a class="app-logo" href="#/">
    <div class="app-logo-mark">运</div>
    <div class="app-logo-text">
      <div class="t1">运营功能说明</div>
      <div class="t2">TMS 操盘系统 · 按钮 SOP</div>
    </div>
  </a>
  <div class="app-search-wrap">
    <div class="app-search" id="appSearch">
      <span class="search-icon">⌕</span>
      <input id="searchInput" type="text" placeholder="搜索按钮 / 模块 / 操作 (按 / 聚焦)" autocomplete="off">
      <button class="clear-btn" id="clearBtn">×</button>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <div class="app-actions">
    <a class="app-action-btn" href="https://wumori655-prog.github.io/Tms-Documentation/" target="_blank">📚 产品文档</a>
  </div>
</header>

<!-- ========== Tabs ========== -->
<nav class="app-tabs" id="appTabs">
  <a class="app-tab" data-module="01-联赛管理" href="#/01-联赛管理">
    <span class="icon">🏆</span><span>联赛管理</span>
  </a>
  <a class="app-tab" data-module="02-操盘列表" href="#/02-操盘列表">
    <span class="icon">📋</span><span>操盘列表</span>
  </a>
  <a class="app-tab" data-module="03-操盘详情" href="#/03-操盘详情">
    <span class="icon">⚙️</span><span>操盘详情</span>
  </a>
  <a class="app-tab" data-module="04-结算管理" href="#/04-结算管理">
    <span class="icon">💰</span><span>结算管理</span>
  </a>
  <a class="app-tab" data-module="05-结算详情" href="#/05-结算详情">
    <span class="icon">📊</span><span>结算详情</span>
  </a>
</nav>

<!-- ========== docsify 渲染区 ========== -->
<div id="app"></div>

<script>
  window.$docsify = {
    name: '',
    repo: '',
    homepage: 'README.md',
    loadSidebar: '_sidebar.md',
    auto2top: true,
    maxLevel: 4,
    subMaxLevel: 3,
    search: 'auto',
    notFoundPage: true,
    relativePath: false,
    alias: {
      '/.*/_sidebar.md': '/_sidebar.md',
    },
    plugins: [
      function (hook) {
        hook.doneEach(function () {
          // 当前 hash 变化时高亮顶部 Tab
          const hash = location.hash.replace(/^#\//, '');
          const tabs = document.querySelectorAll('.app-tab');
          tabs.forEach(t => {
            const m = t.getAttribute('data-module');
            t.classList.toggle('active', hash.startsWith(m));
          });
        });
        hook.ready(function () {
          document.body.classList.add('ready');
        });
      }
    ]
  };
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

<script>
/* ========== 顶部全文搜索(自定义,跨所有 5 份运营文档) ========== */
(function () {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  const wrap = document.getElementById('appSearch');
  const clearBtn = document.getElementById('clearBtn');

  const FILES = [
    { path: '01-联赛管理.md', title: '联赛管理' },
    { path: '02-操盘列表.md', title: '操盘列表' },
    { path: '03-操盘详情.md', title: '操盘详情' },
    { path: '04-结算管理.md', title: '结算管理' },
    { path: '05-结算详情.md', title: '结算详情' },
  ];

  let docs = []; // { path, title, sections: [{heading, body}] }
  let loaded = false, loading = false;
  let activeIdx = -1;

  async function buildIndex() {
    if (loaded || loading) return;
    loading = true;
    for (const f of FILES) {
      try {
        const r = await fetch(f.path);
        if (!r.ok) continue;
        const text = await r.text();
        // 按二级/三级标题切片
        const lines = text.split('\n');
        const sections = [];
        let cur = { heading: f.title + ' · 总览', body: '' };
        for (const ln of lines) {
          const m = ln.match(/^(##+)\s+(.+?)\s*$/);
          if (m && m[1].length <= 3) {
            if (cur.body.trim().length > 0 || cur.heading) sections.push(cur);
            cur = { heading: m[2].replace(/^#+\s*/, ''), body: '' };
          } else {
            cur.body += ln + '\n';
          }
        }
        if (cur.body.trim()) sections.push(cur);
        docs.push({ path: f.path, title: f.title, sections });
      } catch (e) {
        console.warn('索引构建失败', f.path, e);
      }
    }
    loaded = true;
    loading = false;
  }

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return text.replace(re, m => `<mark>${m}</mark>`);
  }

  function search(q) {
    q = q.trim();
    if (!q) { clearSearch(); return; }
    if (!loaded) {
      results.innerHTML = '<div class="result-empty">正在构建索引...</div>';
      wrap.classList.add('active');
      return;
    }
    const hits = [];
    const ql = q.toLowerCase();
    for (const d of docs) {
      for (const s of d.sections) {
        const h = (s.heading || '').toLowerCase();
        const b = (s.body || '').toLowerCase();
        if (h.includes(ql) || b.includes(ql)) {
          // 找上下文片段
          let idx = b.indexOf(ql);
          let snippet = '';
          if (idx >= 0) {
            const start = Math.max(0, idx - 30);
            const end = Math.min(b.length, idx + ql.length + 50);
            snippet = (start > 0 ? '...' : '') + s.body.substring(start, end) + (end < b.length ? '...' : '');
          } else {
            snippet = s.body.substring(0, 80);
          }
          // 锚点
          const slug = s.heading.replace(/[【】\[\]\(\)（）.,，。·\s\/]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').toLowerCase();
          hits.push({
            path: d.path,
            module: d.title,
            heading: s.heading,
            snippet,
            slug,
          });
          if (hits.length >= 30) break;
        }
      }
      if (hits.length >= 30) break;
    }
    if (!hits.length) {
      results.innerHTML = '<div class="result-empty">未找到匹配结果</div>';
    } else {
      results.innerHTML = hits.map(h => `
        <div class="result-item" data-path="${h.path}" data-slug="${h.slug}">
          <div class="result-item-title">${highlight(h.heading, q)}</div>
          <div class="result-item-path">${h.module}</div>
          <div class="result-item-snippet">${highlight(h.snippet.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])), q)}</div>
        </div>
      `).join('');
    }
    wrap.classList.add('active');
    activeIdx = -1;
    results.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const path = el.getAttribute('data-path');
        const slug = el.getAttribute('data-slug');
        const hashPath = path.replace(/\.md$/, '');
        location.hash = '#/' + hashPath + (slug ? ('?id=' + slug) : '');
        clearSearch();
      });
    });
  }

  function clearSearch() {
    input.value = '';
    results.innerHTML = '';
    wrap.classList.remove('active');
    wrap.classList.remove('has-text');
  }

  let timer;
  input.addEventListener('input', (e) => {
    const v = e.target.value;
    wrap.classList.toggle('has-text', !!v);
    clearTimeout(timer);
    timer = setTimeout(() => search(v), 150);
  });
  input.addEventListener('focus', () => {
    if (input.value) search(input.value);
    if (!loaded && !loading) buildIndex();
  });
  clearBtn.addEventListener('click', () => { clearSearch(); input.focus(); });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.app-search')) wrap.classList.remove('active');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== input && !e.ctrlKey && !e.metaKey) {
      e.preventDefault(); input.focus();
    }
    if (e.key === 'Escape') { clearSearch(); input.blur(); }
    if (wrap.classList.contains('active')) {
      const items = results.querySelectorAll('.result-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = (activeIdx + 1) % items.length;
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        items[activeIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = (activeIdx - 1 + items.length) % items.length;
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        items[activeIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].click();
        else if (items[0]) items[0].click();
      }
    }
  });
})();
</script>
</body>
</html>
